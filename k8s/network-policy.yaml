
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy

metadata:
  name: bms-network-policy
  namespace: bookmyshow

spec:
  podSelector:
    matchLabels:
      app: bookmyshow

  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Allow HTTP traffic from ingress-nginx namespace (or GKE ingress)
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 80

    # Allow GCP Load Balancer health checks
    - from:
        - ipBlock:
            cidr: 130.211.0.0/22
        - ipBlock:
            cidr: 35.191.0.0/16
      ports:
        - protocol: TCP
          port: 80

  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # Allow HTTPS outbound traffic
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.169.254/32
      ports:
        - protocol: TCP
          port: 443

