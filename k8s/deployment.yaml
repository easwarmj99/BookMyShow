apiVersion: apps/v1
kind: Deployment

metadata:
  name: bookmyshow-app
  namespace: bookmyshow
  labels:
    app: bookmyshow
    version: "1.0"
    managed-by: gitlab-cicd

spec:
  replicas: 1

  selector:
    matchLabels:
      app: bookmyshow

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app: bookmyshow
        version: "1.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "80"
        prometheus.io/path: "/"

    spec:
      serviceAccountName: bms-ksa
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60

      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: bookmyshow-app
          image: us-central1-docker.pkg.dev/PROJECT_ID/bms-registry/bookmyshow-app:IMAGE_TAG
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 80
              protocol: TCP

          envFrom:
            - configMapRef:
                name: bms-config

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          livenessProbe:
             httpGet:
                path: /health
                port: 80

          readinessProbe:
             httpGet:
               path: /health
               port: 80 
               
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            capabilities:
              drop:
                - ALL

          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx

            - name: nginx-run
              mountPath: /var/run

            - name: tmp-vol
              mountPath: /tmp

      volumes:
        - name: nginx-cache
          emptyDir: {}

        - name: nginx-run
          emptyDir: {}

        - name: tmp-vol
          emptyDir: {}
