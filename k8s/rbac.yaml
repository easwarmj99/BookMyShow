apiVersion: v1
kind: ServiceAccount
metadata:
  name: bms-ksa
  namespace: bookmyshow
  labels:
    app: bookmyshow
  annotations:
    # Workload Identity: link Kubernetes SA to GCP Service Account
    # (The IAM binding must also be created — see Phase 10.5)
    iam.gke.io/gcp-service-account: bms-app-sa@PROJECT_ID.iam.gserviceaccount.com

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: bms-app-role
  namespace: bookmyshow
rules:
  # Allow app to read its own ConfigMap (for config reload if needed)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bms-app-rolebinding
  namespace: bookmyshow
subjects:
  - kind: ServiceAccount
    name: bms-ksa
    namespace: bookmyshow

roleRef:
  kind: Role
  name: bms-app-role
  apiGroup: rbac.authorization.k8s.io
