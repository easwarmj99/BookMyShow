apiVersion: v1
kind: Service

metadata:
  name: bookmyshow-svc
  namespace: bookmyshow

  labels:
    app: bookmyshow

  annotations:
    cloud.google.com/backend-config: '{"default":"bms-backend-config"}'
    cloud.google.com/neg: '{"ingress": true}'

spec:
  type: ClusterIP

  selector:
    app: bookmyshow

  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80

  sessionAffinity: None
