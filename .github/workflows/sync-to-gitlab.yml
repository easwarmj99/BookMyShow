name: Sync to GitLab

on:
  push:
    branches: [master, main]

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to GitLab
        run: |
          git remote add gitlab https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/easwarmj/BookMyShow.git
          git push gitlab HEAD:main --force
