# sonar-project.properties
# SonarQube project configuration for Book-My-Show React app
sonar.projectKey=bookmyshow-devsecops
sonar.projectName=Book-My-Show React Application
sonar.projectVersion=1.0
# Source code location
sonar.sources=bookmyshow-app/src
# Language
sonar.language=js
sonar.sourceEncoding=UTF-8
# Exclude test files and build artifacts from analysis
sonar.exclusions=**/node_modules/**,**/build/**,**/*.test.js,**/*.spec.js,**/coverage/**
# Test coverage report (generated by jest --coverage)
sonar.javascript.lcov.reportPaths=bookmyshow-app/coverage/lcov.info
# Exclude test files from coverage requirement
sonar.coverage.exclusions=**/*.test.js,**/*.spec.js,**/index.js
