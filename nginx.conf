# nginx.conf — Secure production nginx configuration for React SPA
# Place at ROOT of repository (same level as Dockerfile)
server {
listen 80;
server_name _;
root /usr/share/nginx/html;
index index.html index.htm;
# nn Security Headers nnnnnnnnnnnnnnnnnnnnnnnnnnnnnnn
# Prevent clickjacking
add_header X-Frame-Options "SAMEORIGIN" always;
# Prevent MIME type sniffing
add_header X-Content-Type-Options "nosniff" always;
# XSS protection for older browsers
add_header X-XSS-Protection "1; mode=block" always;
# Control referrer information
add_header Referrer-Policy "no-referrer-when-downgrade" always;
# Content Security Policy
add_header Content-Security-Policy "default-src self; script-src self unsafe-inline; style-src s
elf unsafe-inline; img-src self data:;" always;
# HTTP Strict Transport Security (HSTS)
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
# Permissions Policy
add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
# Hide nginx version from response headers
server_tokens off;
# nn Health Check Endpoint nnnnnnnnnnnnnnnnnnnnnnnnnn
# Used by Kubernetes liveness and readiness probes
location /health {
access_log off;
return 200 "healthy";
add_header Content-Type text/plain;
}
# nn React SPA Routing nnnnnnnnnnnnnnnnnnnnnnnnnnnnnn
# All requests go to index.html for React Router to handle
location / {
try_files $uri $uri/ /index.html;
}
# nn Static Asset Caching nnnnnnnnnnnnnnnnnnnnnnnnnnn
# Cache JS, CSS, images for 1 year (they have content hashes)
location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
expires 1y;
add_header Cache-Control "public, immutable";
access_log off;
}
# nn Security: Block Hidden Files nnnnnnnnnnnnnnnnnnn
# Deny access to .git, .env, .htaccess etc.
location ~ /\. {
deny all;
return 404;
}
# nn Gzip Compression nnnnnnnnnnnnnnnnnnnnnnnnnnnnnnn
gzip on;
gzip_vary on;
gzip_min_length 1000;
gzip_proxied any;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
